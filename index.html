<!doctype html>
<html lang="en" class="dark">

  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add(theme);
        } catch (e) { }
      })();
    </script>
    <title>Collins Oden — Software Engineer</title>
    <meta name="description" content="Collins Oden — Full Stack Software Engineer specializing in TypeScript, JavaScript, Python, React, and Node.js. Building performant web applications and backend systems." />
    <link rel="canonical" href="https://collinsoden.me/" />
    <meta name="theme-color" content="#f97316" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://collinsoden.me/" />
    <meta property="og:title" content="Collins Oden — Software Engineer" />
    <meta property="og:description" content="Full Stack Software Engineer specializing in TypeScript, Python, React, and Node.js. Building performant web applications and backend systems." />
    <meta property="og:image" content="https://collinsoden.me/logo.png" />
    <meta property="og:site_name" content="Collins Oden" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Collins Oden — Software Engineer" />
    <meta name="twitter:description" content="Full Stack Software Engineer specializing in TypeScript, Python, React, and Node.js." />
    <meta name="twitter:image" content="https://collinsoden.me/logo.png" />
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
